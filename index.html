<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FightCamp Manager</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>FightCamp Manager</h1>

<!-- LOGIN -->
<div>
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha" type="password">
  <button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminArea">

  <h2>Cadastrar Atleta</h2>
  <input id="nome" placeholder="Nome">
  <input id="peso" placeholder="Peso atual">
  <input id="meta" placeholder="Peso meta">
  <button onclick="salvar()">Salvar</button>

  <h3>Presença manual</h3>
  <input id="nomeManual" placeholder="Nome do atleta">
  <button onclick="presencaManual()">Marcar</button>

  <h3>Importar CSV</h3>
  <input type="file" id="fileInput">
  <button onclick="importarCSV()">Importar</button>

  <h3>Adicionar Grau</h3>
  <input id="nomeGrau" placeholder="Nome">
  <input id="grau" placeholder="Grau">
  <button onclick="addGrau()">Salvar Grau</button>

</div>

<h2>Atletas</h2>
<div id="lista"></div>

<script>
const ADMIN_EMAIL = "scosta.vanessa@gmail.com";

const client = supabase.createClient(
  "https://dvqomwivyrjckkdyblof.supabase.co",
  "COLE_AQUI_SUA_ANON_KEY"
);

let usuarioLogado = null;

async function init() {
  const { data } = await client.auth.getUser();
  if (data.user) {
    usuarioLogado = data.user;
    aplicarPermissoes();
    carregar();
  }
}
init();

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) return alert("Erro login");

  usuarioLogado = data.user;
  aplicarPermissoes();
  carregar();

  alert("Logado 🔥");
}

function isAdmin() {
  return usuarioLogado?.email === ADMIN_EMAIL;
}

function aplicarPermissoes() {
  if (!isAdmin()) {
    document.getElementById("adminArea").style.display = "none";
  }
}

async function salvar() {
  if (!isAdmin()) return;

  const nome = document.getElementById("nome").value;
  const peso = parseFloat(document.getElementById("peso").value);
  const meta = parseFloat(document.getElementById("meta").value);

  await client.from("atletas").insert([
    { nome, peso_atual: peso, peso_meta: meta }
  ]);

  carregar();
}

async function presencaManual() {
  if (!isAdmin()) return;

  const nome = document.getElementById("nomeManual").value;

  const { data: atleta } = await client
    .from("atletas")
    .select("*")
    .eq("nome", nome)
    .single();

  if (!atleta) return alert("Atleta não encontrado");

  await client.from("presencas").insert([{ atleta_id: atleta.id }]);

  carregar();
}

async function marcarPresenca(id) {
  await client.from("presencas").insert([{ atleta_id: id }]);
  carregar();
}

async function importarCSV() {
  if (!isAdmin()) return;

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Seleciona arquivo");

  const text = await file.text();
  const linhas = text.split("\n");

  for (let i = 1; i < linhas.length; i++) {
    const [nome, data] = linhas[i].split(",");

    const { data: atleta } = await client
      .from("atletas")
      .select("*")
      .eq("nome", nome.trim())
      .single();

    if (!atleta) continue;

    await client.from("presencas").insert([
      { atleta_id: atleta.id, data: data.trim() }
    ]);
  }

  alert("Importado 🚀");
  carregar();
}

async function addGrau() {
  if (!isAdmin()) return;

  const nome = document.getElementById("nomeGrau").value;
  const grau = document.getElementById("grau").value;

  const { data: atleta } = await client
    .from("atletas")
    .select("*")
    .eq("nome", nome)
    .single();

  if (!atleta) return alert("Atleta não encontrado");

  await client.from("atletas")
    .update({ grau })
    .eq("id", atleta.id);

  carregar();
}

async function carregar() {
  const { data } = await client.from("atletas").select("*");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  for (const a of data) {

    const { data: pres } = await client
      .from("presencas")
      .select("*")
      .eq("atleta_id", a.id);

    const total = pres ? pres.length : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${a.nome}</b><br>
      Grau: ${a.grau || 0}<br>
      Peso: ${a.peso_atual}kg<br>
      Treinos: ${total}<br>
      <button onclick="marcarPresenca('${a.id}')">Treinei hoje</button>
    `;

    lista.appendChild(div);
  }
}
</script>

</body>
</html>
