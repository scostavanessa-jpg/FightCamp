<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FightCamp Manager</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #111; color: #fff; padding: 20px; }
    input, button { margin: 5px; padding: 10px; border-radius: 6px; border: none; }
    button { background: #00c853; color: #fff; cursor: pointer; }
    .card { background: #1e1e1e; padding: 10px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>

<body>

<h1>🥋 FightCamp Manager</h1>

<input id="nome" placeholder="Nome">
<input id="peso" placeholder="Peso">
<input id="meta" placeholder="Meta">
<button onclick="salvar()">Salvar</button>

<div id="lista"></div>

<script>
const client = window.supabase.createClient(
  "https://dvqomwivyrjckkdyblof.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cW9td2l2eXJqY2trZHlibG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzUwOTEsImV4cCI6MjA5MjgxMTA5MX0.PPnlsqG__lUbw_SCOGzCPgo95GgbZD5zSJbVg3scQLs"
);

async function salvar() {
  const nome = document.getElementById("nome").value;
  const peso = parseFloat(document.getElementById("peso").value);
  const meta = parseFloat(document.getElementById("meta").value);

  const { error } = await client.from("atletas").insert([
    { nome, peso_atual: peso, peso_meta: meta }
  ]);

  if (error) {
    alert("Erro: " + error.message);
    return;
  }

  carregar();
}

async function marcarPresenca(id) {
  const { error } = await client.from("presencas").insert([
    { atleta_id: id }
  ]);

  if (error) {
    alert("Já marcou hoje 👀");
    return;
  }

  carregar();
}

async function carregar() {
  const { data } = await client.from("atletas").select("*");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  for (const a of data) {

    const { data: pres } = await client
      .from("presencas")
      .select("*")
      .eq("atleta_id", a.id);

    const total = pres ? pres.length : 0;
    const meta = 70;
    const progresso = Math.round((total/meta)*100);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${a.nome}</b><br>
      Peso: ${a.peso_atual}kg<br>
      Treinos: ${total}/${meta} (${progresso}%)<br>
      <button onclick="marcarPresenca('${a.id}')">Treinei hoje</button>
    `;

    lista.appendChild(div);
  }
}

carregar();
</script>

</body>
</html>
