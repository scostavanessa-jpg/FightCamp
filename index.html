<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>FightCamp Manager</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background: #111; color: #fff; padding: 20px; }
    input, button { margin: 5px; padding: 10px; border-radius: 6px; border: none; }
    button { background: #00c853; color: #fff; cursor: pointer; }
    .card { background: #1e1e1e; padding: 10px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>

<body>

<h1>🥋 FightCamp Manager</h1>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<hr>

<h2>Cadastro</h2>
<input id="nome" placeholder="Nome">
<input id="peso" placeholder="Peso">
<input id="meta" placeholder="Meta">
<button onclick="salvar()">Salvar</button>

<hr>

<h2>Importar Presenças</h2>
<input type="file" id="fileInput">
<button onclick="importarCSV()">Importar CSV</button>

<hr>

<h2>Lançamento Manual</h2>
<input id="nomeManual" placeholder="Nome">
<button onclick="presencaManual()">Adicionar Presença</button>

<hr>

<h2>Adicionar Grau</h2>
<input id="nomeGrau" placeholder="Nome">
<input id="grau" placeholder="Grau">
<button onclick="addGrau()">Salvar Grau</button>

<div id="lista"></div>

<script>
const client = window.supabase.createClient(
  "https://dvqomwivyrjckkdyblof.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cW9td2l2eXJqY2trZHlibG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzUwOTEsImV4cCI6MjA5MjgxMTA5MX0.PPnlsqG__lUbw_SCOGzCPgo95GgbZD5zSJbVg3scQLs"
);

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await client.auth.signInWithPassword({ email, password: senha });

  if (error) return alert("Erro login");
  alert("Logado 🔥");
}

async function salvar() {
  const nome = document.getElementById("nome").value;
  const peso = parseFloat(document.getElementById("peso").value);
  const meta = parseFloat(document.getElementById("meta").value);

  await client.from("atletas").insert([{ nome, peso_atual: peso, peso_meta: meta }]);
  carregar();
}

async function presencaManual() {
  const nome = document.getElementById("nomeManual").value;

  const { data: atleta } = await client.from("atletas").select("*").eq("nome", nome).single();
  if (!atleta) return alert("Atleta não encontrado");

  await client.from("presencas").insert([{ atleta_id: atleta.id }]);
  carregar();
}

async function marcarPresenca(id) {
  await client.from("presencas").insert([{ atleta_id: id }]);
  carregar();
}

async function importarCSV() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Seleciona arquivo");

  const text = await file.text();
  const linhas = text.split("\n");

  for (let i = 1; i < linhas.length; i++) {
    const [nome, data] = linhas[i].split(",");

    const { data: atleta } = await client
      .from("atletas")
      .select("*")
      .eq("nome", nome.trim())
      .single();

    if (!atleta) continue;

    await client.from("presencas").insert([
      { atleta_id: atleta.id, data: data.trim() }
    ]);
  }

  alert("Importado 🚀");
  carregar();
}

async function addGrau() {
  const nome = document.getElementById("nomeGrau").value;
  const grau = document.getElementById("grau").value;

  const { data: atleta } = await client
    .from("atletas")
    .select("*")
    .eq("nome", nome)
    .single();

  if (!atleta) return alert("Atleta não encontrado");

  await client.from("atletas").update({ grau }).eq("id", atleta.id);

  alert("Grau atualizado");
  carregar();
}

async function carregar() {
  const { data } = await client.from("atletas").select("*");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  for (const a of data) {
    const { data: pres } = await client
      .from("presencas")
      .select("*")
      .eq("atleta_id", a.id);

    const total = pres ? pres.length : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${a.nome}</b><br>
      Grau: ${a.grau || 0}<br>
      Peso: ${a.peso_atual}kg<br>
      Treinos: ${total}<br>
      <button onclick="marcarPresenca('${a.id}')">Treinei hoje</button>
    `;

    lista.appendChild(div);
  }
}

carregar();
</script>

</body>
</html>
